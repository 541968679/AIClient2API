<link rel="stylesheet" href="components/section-proxies.css">
<section id="proxies" class="section" aria-labelledby="proxies-title">
    <div class="section-header">
        <div>
            <h2 id="proxies-title" data-i18n="proxies.title">Proxy Management</h2>
            <p data-i18n="proxies.subtitle">Manage HTTP/SOCKS proxies and subscription conversion nodes assigned to Provider nodes.</p>
        </div>
        <div class="header-actions">
            <button class="btn btn-secondary" id="refreshProxiesBtn">
                <i class="fas fa-sync-alt"></i>
                <span data-i18n="common.refresh">Refresh</span>
            </button>
            <button class="btn btn-secondary" id="importProxiesBtn">
                <i class="fas fa-file-import"></i>
                <span data-i18n="proxies.import">Batch Import</span>
            </button>
            <button class="btn btn-secondary" id="importSubscriptionBtn">
                <i class="fas fa-cloud-download-alt"></i>
                <span data-i18n="proxies.importSubscription">Import Subscription</span>
            </button>
            <button class="btn btn-primary" id="addProxyBtn">
                <i class="fas fa-plus"></i>
                <span data-i18n="proxies.add">Add Proxy</span>
            </button>
        </div>
    </div>

    <div class="proxies-summary-grid">
        <div class="proxies-summary-item">
            <span data-i18n="proxies.total">Total Proxies</span>
            <strong id="proxiesTotalCount">0</strong>
        </div>
        <div class="proxies-summary-item">
            <span data-i18n="proxies.poolEnabled">Pool Proxies</span>
            <strong id="proxiesPoolCount">0</strong>
        </div>
        <div class="proxies-summary-item">
            <span data-i18n="proxies.assigned">Assigned Nodes</span>
            <strong id="proxiesAssignedCount">0</strong>
        </div>
        <div class="proxies-summary-item">
            <span data-i18n="proxies.subscriptionNodes">Subscription Nodes</span>
            <strong id="proxiesSubscriptionCount">0</strong>
        </div>
    </div>

    <div class="proxies-toolbar">
        <div class="search-input-wrapper">
            <i class="fas fa-search"></i>
            <input id="proxySearchInput" type="search" data-i18n-placeholder="proxies.search" placeholder="Search name, address, tags...">
        </div>
        <button class="btn btn-secondary" id="generateSingBoxBtn">
            <i class="fas fa-code"></i>
            <span data-i18n="proxies.singBox">Generate sing-box Config</span>
        </button>
    </div>

    <div class="proxies-table-wrap">
        <table class="proxies-table">
            <thead>
                <tr>
                    <th data-i18n="proxies.name">Name</th>
                    <th data-i18n="proxies.protocol">Protocol</th>
                    <th data-i18n="proxies.address">Address</th>
                    <th data-i18n="proxies.status">Status</th>
                    <th data-i18n="proxies.usage">Usage</th>
                    <th data-i18n="proxies.check">Check</th>
                    <th data-i18n="common.actions">Actions</th>
                </tr>
            </thead>
            <tbody id="proxiesTableBody">
                <tr>
                    <td colspan="7" class="proxies-empty" data-i18n="common.loading">Loading...</td>
                </tr>
            </tbody>
        </table>
    </div>
</section>
